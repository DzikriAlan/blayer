# SonarQube Project Configuration
# Generated for Blayer project

sonar.projectKey=blayer
sonar.projectName=Blayer
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8

# Source directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx

# Exclude node_modules and build artifacts
sonar.exclusions=**/node_modules/**,**/.next/**,.next/**,dist/**

# Code coverage settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/node_modules/**

# Coverage thresholds
sonar.coverage.threshold=60

# Complexity settings
sonar.javascript.jshint.reportPaths=coverage/eslint.json

# Code duplication settings
sonar.cpd.minimumLines=5
sonar.cpd.minimumTokens=100

# Quality gate settings
sonar.qualitygate=Blayer Quality Gate

# Security settings - OWASP Top 10 checks enabled
sonar.security.hotspots.enabled=true

# TypeScript specific
sonar.typescript.tsconfigPath=tsconfig.json
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Max allowed complexity (McCabe)
sonar.cpd.exclusions=node_modules/**
